name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: build · typecheck · test · bench
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Build engine (required by api/web)
        run: pnpm --filter @ahcf-cps/engine build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Bench (engine perf regression gate)
        run: pnpm --filter @ahcf-cps/engine bench

      - name: Build
        run: pnpm build

  e2e:
    name: e2e (Playwright)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @ahcf-cps/engine build
      - run: pnpm --filter @ahcf-cps/web build
      - name: Install Playwright browsers
        run: pnpm --filter @ahcf-cps/web exec playwright install --with-deps chromium
      - name: Run e2e
        run: pnpm --filter @ahcf-cps/web exec playwright test --project=chromium
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
