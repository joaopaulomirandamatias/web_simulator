# Railway — um serviço: API Fastify + frontend estático (build no apps/api/Dockerfile).
# Variáveis (DATABASE_URL, STORE_BACKEND, OPENROUTER_*, etc.) na aba Variables.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
