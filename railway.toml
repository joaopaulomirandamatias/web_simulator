# Railway — serviço API (schema oficial: https://docs.railway.com/reference/config-as-code).
# O Railway só aceita [build] / [deploy] por arquivo; não há [[services]] no config-as-code.
# Variáveis (NODE_ENV, PORT, DATABASE_URL, CORS_ORIGIN, etc.) configurar na aba Variables do serviço.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
