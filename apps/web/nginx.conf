server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — qualquer rota carrega index.html (React Router).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache agressivo para assets com hash.
  location /assets/ {
    expires 7d;
    add_header Cache-Control "public, immutable";
  }

  # Healthcheck.
  location = /healthz {
    default_type text/plain;
    return 200 'ok';
  }
}
